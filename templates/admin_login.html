<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Admin Login - The Kala Lawyers</title>
    <link rel="icon" href="{{ url_for('static', filename='images/kala_lawyer_logo.png') }}" type="image/png" />
    <link rel="stylesheet" href="{{ url_for('static', filename='css/styles.css') }}" />
    <style>
      .login-container {
        max-width: 400px;
        margin: 6rem auto;
        padding: 3rem 2.5rem;
        background-color: var(--bg-card);
        border: 1px solid var(--border-color);
        border-radius: 8px;
        box-shadow: var(--shadow-premium);
        text-align: center;
      }
      .login-title {
        font-family: 'Merriweather', serif;
        font-size: 1.8rem;
        color: var(--primary-color);
        margin-top: 0;
        margin-bottom: 2rem;
      }
      .form-group {
        text-align: left;
        margin-bottom: 1.5rem;
        display: flex;
        flex-direction: column;
      }
      .form-group label {
        font-size: 0.9rem;
        margin-bottom: 0.5rem;
        font-weight: 600;
        color: var(--primary-color);
      }
      .form-control {
        padding: 0.8rem;
        font-size: 0.95rem;
        border: 1px solid var(--border-color);
        border-radius: 6px;
        background-color: #ffffff;
        color: var(--primary-color);
      }
      .form-control:focus {
        outline: none;
        border-color: var(--accent-color);
      }
      .login-btn {
        width: 100%;
        padding: 0.9rem;
        font-size: 1rem;
        font-weight: 700;
        background: var(--accent-color);
        color: #ffffff;
        border: none;
        border-radius: 6px;
        cursor: pointer;
        transition: background-color 0.15s;
        margin-top: 1rem;
      }
      .login-btn:hover {
        background-color: var(--accent-hover);
      }
      .error-alert {
        background-color: #fde8e8;
        color: #9b1c1c;
        padding: 0.8rem;
        border-radius: 6px;
        font-size: 0.9rem;
        margin-bottom: 1.5rem;
        border: 1px solid #fbd5d5;
        text-align: left;
      }
    </style>
  </head>
  <body>
    <!-- Header -->
    <header>
      <div class="header-main">
        <a href="{{ url_for('home') }}" class="logo"><img src="{{ url_for('static', filename='images/kala_lawyer_logo.png') }}" alt="Kala Lawyer Logo" />KALA <span>LAWYER</span></a>
        
        <nav class="nav-panel">
          <a href="{{ url_for('home') }}">Home</a>
          <a href="{{ url_for('about') }}">About Us</a>
          <a href="{{ url_for('practice') }}">Practice Area</a>
          <a href="{{ url_for('case') }}">Case</a>
          <a href="{{ url_for('contact') }}">Contact</a>
        </nav>
      </div>
    </header>

    <main class="container">
      <div class="login-container">
        <h2 class="login-title">Admin Access</h2>

        <form id="loginForm">
          <div class="form-group">
            <label for="username">Username / Email</label>
            <input
              type="text"
              id="username"
              name="username"
              class="form-control"
              required
              placeholder="Enter admin username or email"
            />
          </div>
          
          <div class="form-group">
            <label for="password">Password</label>
            <input
              type="password"
              id="password"
              name="password"
              class="form-control"
              required
              placeholder="Enter admin password"
            />
          </div>

          <button type="submit" class="login-btn">LOG IN</button>
        </form>
      </div>
    </main>

    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <script src="{{ url_for('static', filename='js/supabase-config.js') }}"></script>
    <script src="{{ url_for('static', filename='js/script.js') }}"></script>
    <script src="{{ url_for('static', filename='js/admin.js') }}"></script>
  </body>
</html>
