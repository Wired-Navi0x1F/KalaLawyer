    <!-- Schema.org JSON-LD CollectionPage for Practice Areas -->
    <script type="application/ld+json">
    {
      "@context": "https://schema.org",
      "@type": "CollectionPage",
      "name": "Practice Areas - The Kala Lawyers",
      "description": "Specialized legal representation in family law, civil disputes, criminal trials, CAT, check bounce, and domestic violence in Rajasthan.",
      "url": "https://thekalalawyers.com/practice.html",
      "mainEntity": {
        "@type": "ItemList",
        "name": "Legal Services Offered by The Kala Lawyers",
        "numberOfItems": {{ areas|length }},
        "itemListElement": [
          {% for area in areas %}
          {
            "@type": "ListItem",
            "position": {{ loop.index }},
            "item": {
              "@type": "Service",
              "name": {{ area.title | tojson }},
              "description": {{ area.short_description | tojson }},
              "url": "https://thekalalawyers.com/practice/{{ area.slug }}.html",
              "provider": {
                "@id": "https://thekalalawyers.com/#legalservice"
              }
            }
          }{% if not loop.last %},{% endif %}
          {% endfor %}
        ]
      }
    }
    </script>
  </head>
