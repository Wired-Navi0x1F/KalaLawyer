    <script>
      // Read URL query parameters to pre-select practice area
      document.addEventListener("DOMContentLoaded", function () {
        const urlParams = new URLSearchParams(window.location.search);
        const areaParam = urlParams.get("area");
        if (areaParam) {
          const selectEl = document.getElementById("practice_area");
          if (selectEl) {
            for (let option of selectEl.options) {
              if (option.value === areaParam) {
                selectEl.value = areaParam;
                break;
              }
            }
          }
        }
      });

      function resetIntakeForm() {
        const form = document.getElementById("contactForm");
        if (form) form.reset();
        document.getElementById("formSuccess").style.display = "none";
        document.getElementById("contactFormWrapper").style.display = "block";
      }
